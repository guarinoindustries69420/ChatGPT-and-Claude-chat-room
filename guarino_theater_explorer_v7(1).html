.chip-gamma{background:#eaf3de;color:#27500a;border-color:#c0dd97}

let selTerm=null, selPaper=null, currentTab='detail';

function isGamma(sym){return sym.startsWith('Γ');}
function getType(sym){return isGamma(sym)?GAMMA:PSI;}
function chipCls(sym,active){
  const t=getType(sym);
  if(!active) return `chip chip-${t==='psi'?'psi':'gamma'}`;
  return `chip active-${t==='psi'?'psi':'gamma'}`;
}

function buildEq(){
  const wrap=document.getElementById('eq-wrap');
  wrap.innerHTML='';
  TEQ.forEach((t,i)=>{
    if(i>0){const m=document.createElement('span');m.className='eq-mul';m.textContent='×';wrap.appendChild(m);}
    const c=document.createElement('span');
    const active=selTerm&&selTerm.sym===t.sym;
    c.className=chipCls(t.sym,active);
    c.title=t.desc;
    c.textContent=t.label;
    c.onclick=()=>selectTerm(t);
    wrap.appendChild(c);
  });
}

function selectTerm(t){
  selTerm=t;
  const ps=t.papers.map(n=>papers[n-1]);
  selPaper=ps[0];
  buildEq();
  renderPanel();
}

function selectPaper(p){
  selPaper=p;
  renderPanel();
}

function setTab(tab){
  currentTab=tab;
  document.getElementById('tab-detail').className='tab'+(tab==='detail'?' active':'');
  document.getElementById('tab-all').className='tab'+(tab==='all'?' active':'');
  document.getElementById('tab-joe').className='tab'+(tab==='joe'?' active':'');
  renderPanel();
}

function getFile(p){
  return p.file.includes('GMS_Turn4/')
    ? `GMS_Turn4/${p.file.replace('GMS_Turn4/','')}`
    : p.file;
}

function getPaper(p){
  sendPrompt(`Please present the file /mnt/user-data/outputs/${getFile(p)}`);
}

function barColor(type){return type===PSI?'#185fa5':'#3b6d11';}

function renderDetail(){
  if(!selPaper){
    return `<div class="empty-state"><div style="font-size:24px">↑</div><div>Click any term above to explore</div></div>`;
  }
  const p=selPaper;
  const t=selTerm;
  const termPapers=t?t.papers.map(n=>papers[n-1]):[];

  let tabSel='';
  if(termPapers.length>1){
    tabSel=`<div style="display:flex;gap:4px;margin-bottom:1rem;">`+
      termPapers.map(pp=>`<span style="padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;background:${pp.n===p.n?'var(--color-text-primary)':'var(--color-background-secondary)'};color:${pp.n===p.n?'var(--color-background-primary)':'var(--color-text-secondary)'};border:0.5px solid var(--color-border-tertiary)" onclick="selectPaper(papers[${pp.n-1}])">${pp.abbr}</span>`).join('')+
    `</div>`;
  }

  const piRows=p.pis.slice(0,8).map(pi=>`<div class="pi-card"><div class="pi-sym">${pi.s}</div><div class="pi-desc">${pi.d}</div></div>`).join('');
  const subRows=p.subs.map(s=>`<div class="sub-row"><span class="sub-sym">${s.s}</span><div class="sub-bar-wrap"><div class="sub-bar" style="width:${(s.v*100).toFixed(0)}%;background:${barColor(p.type)}"></div></div><span class="sub-val">${s.v.toFixed(2)}</span></div>`).join('');
  const caseCards=p.cases.map(c=>`<div class="case-card"><div class="case-name">${c.n}</div><div class="case-score" style="color:${barColor(p.type)}">${c.sc}</div><div class="case-bind">binding: ${c.b}</div></div>`).join('');
  const ifaceItems=(p.ifaces||[]).map(i=>`<div class="iface">${i}</div>`).join('');

  return `
  ${tabSel}
  <div class="detail-hdr">
    <div>
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px">
        <span class="detail-sym">${p.sym}</span>
        <span class="badge badge-${p.type}">${p.type==='psi'?'Ψ capability':'Γ coupling'}</span>
      </div>
      <div class="detail-name">${p.name}</div>
      <div class="detail-paper">Paper ${p.r} · ${p.abbr} · ${p.domain}</div>
    </div>
    <button class="get-paper-btn" onclick="getPaper(papers[${p.n-1}])">Get paper ↗</button>
  </div>

  <div class="sect">
    <div class="sect-lbl">Description</div>
    <div class="desc-text">${p.desc}</div>
  </div>

  <div class="sect">
    <div class="sect-lbl">Governing formula</div>
    <div class="formula">${p.formula}</div>
  </div>

  <div class="sect">
    <div class="sect-lbl">Pi groups (${p.pis.length} total)</div>
    <div class="pi-grid">${piRows}</div>
  </div>

  <div class="sect">
    <div class="sect-lbl">Sub-metric representative values</div>
    ${subRows}
  </div>

  <div class="sect">
    <div class="sect-lbl">Canonical cases (normalized)</div>
    <div class="cases-grid">${caseCards}</div>
  </div>

  ${p.ifaces&&p.ifaces.length?`<div class="sect"><div class="sect-lbl">Suite interfaces</div><div class="interfaces-grid">${ifaceItems}</div></div>`:''}
  `;
}

function renderAll(){
  return `<div class="all-grid">`+
    papers.map(p=>`
      <div class="all-card" onclick="jumpToPaper(${p.n})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="all-card-sym" style="color:${barColor(p.type)}">${p.sym}</div>
          <span class="badge badge-${p.type}" style="font-size:10px;padding:2px 6px">Paper ${p.r}</span>
        </div>
        <div class="all-card-name">${p.abbr}</div>
        <div class="all-card-paper" style="margin-top:2px">${p.domain}</div>
        <button style="margin-top:6px;padding:3px 8px;border-radius:var(--border-radius-md);font-size:10px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);background:transparent" onclick="event.stopPropagation();getPaper(papers[${p.n-1}])">get paper ↗</button>
      </div>`).join('')+
  `</div>`;
}

function jumpToPaper(n){
  const p=papers[n-1];
  const term=TEQ.find(t=>t.papers.includes(n));
  selPaper=p;
  selTerm=term||null;
  currentTab='detail';
  document.getElementById('tab-detail').className='tab active';
  document.getElementById('tab-all').className='tab';
  buildEq();
  renderPanel();
}

function renderPanel(){
  const el=document.getElementById('panel');
  if(currentTab==='detail') el.innerHTML=renderDetail();
  else if(currentTab==='all') el.innerHTML=renderAll();
  else if(currentTab==='joe') el.innerHTML=renderJoe();
}

  {q:`What is GADM paper 16`,k:["gadm", "paper xvi", "paper 16", "air defense", "shorad", "\u03c8ad", "manpads", "patriot", "short range"],a:`GADM — Guarino Air Defense Metric (Paper XVI)

  {q:`What is GAAM paper 17`,k:["gaam", "paper xvii", "paper 17", "attack aviation", "helicopter", "apache", "uas", "rotary", "\u03c8aa"],a:`GAAM — Guarino Attack Aviation Metric (Paper XVII)

  {q:`What is GEM paper 18`,k:["gem", "paper xviii", "paper 18", "engineer", "combat engineering", "\u03c8eng", "mobility", "countermobility", "survivability"],a:`GEM — Guarino Engineer Metric (Paper XVIII)

  {q:`What is GSOM paper 19`,k:["gsom", "paper xix", "paper 19", "special operations", "sof", "\u03c8so", "unconventional", "direct action", "ranger"],a:`GSOM — Guarino Special Operations Metric (Paper XIX)

  {q:`What is GMEDM paper 20`,k:["gmedm", "paper xx", "paper 20", "medical", "medevac", "\u03c8med", "casualty", "surgeon", "golden hour"],a:`GMEDM — Guarino Medical Metric (Paper XX)

  {q:`What is GCAIM paper 21`,k:["gcaim", "paper xxi", "paper 21", "civil affairs", "information environment", "\u03c8caie", "psyop", "influence"],a:`GCAIM — Guarino Civil Affairs and Information Environment Metric (Paper XXI)

  {q:`What is GTFM paper 22`,k:["gtfm", "paper xxii", "paper 22", "theater fires", "\u03c8tf", "ballistic missile", "glcm", "cruise missile", "himars", "atacms"],a:`GTFM — Guarino Theater Fires Metric (Paper XXII)

  {q:`What is GALM paper 23`,k:["galm", "paper xxiii", "paper 23", "amphibious", "littoral", "\u03c8al", "ship to shore", "assault", "marine", "landing"],a:`GALM — Guarino Amphibious and Littoral Metric (Paper XXIII)

  {q:`What is GAFM paper 24`,k:["gafm", "paper xxiv", "paper 24", "air fighters", "air superiority", "\u03c8af", "counter air", "f-35", "f-22", "dogfight"],a:`GAFM — Guarino Air Fighters Metric (Paper XXIV)

Domain: Air superiority and counter-air platform effectiveness. Pi groups capture BVR engagement range ratio, radar cross-section advantage, specific excess power ratio, missile Pk ratio, and sortie generation rate. ΨAF scores the ability to achieve and maintain air superiority — the enabling condition for all other air domain operations. Interfaces with GASM (VI) whose non-strike missions depend on air superiority.`},
  {q:`What is GLMM paper 25`,k:["glmm", "paper xxv", "paper 25", "loitering munitions", "\u03c8lmm", "drone", "autonomous", "kamikaze", "switchblade", "shahed"],a:`GLMM — Guarino Loitering Munitions Metric (Paper XXV)

  {q:`What is GBEM bridge paper 26`,k:["gbem bridge", "paper xxvi", "paper 26", "\u03b3base", "base coupling", "basing efficiency", "forward base"],a:`GBEM Bridge — Guarino Base Efficiency Coupling Coefficient (Paper XXVI)
Score: ΓBase = ΨBase^½

Domain: Formal derivation linking forward basing efficiency to theater-level effectiveness. Paper XXVI takes GBEM's ΨBase score (Paper IV) and derives the theater coupling coefficient ΓBase through dimensional analysis. The square-root relationship reflects that basing inefficiency degrades theater capability at a diminishing rate — a completely non-functional base (ΨBase → 0) drives ΓBase → 0, but partial degradation is partially recoverable. This paper enters ΓBase directly into ΨTheater.`},
  {q:`What is GUWM paper 27`,k:["guwm", "paper xxvii", "paper 27", "undersea", "submarine", "\u03c8uw", "acoustic", "torpedo", "uuv", "sonar"],a:`GUWM — Guarino Undersea Warfare Metric (Paper XXVII)

  {q:`What is GSCM paper 28`,k:["gscm", "paper xxviii", "paper 28", "strategic cyber", "\u03b3strategiccyber", "apt", "resilience", "nation state", "hack"],a:`GSCM — Guarino Strategic Cyber Metric (Paper XXVIII)

  {q:`What is GJFM paper 29`,k:["gjfm", "paper xxix", "paper 29", "joint fires", "\u03b3jf", "synchronization", "targeting", "jtac", "fires coordination"],a:`GJFM — Guarino Joint Fires Metric (Paper XXIX)

  {q:`What is GHWM paper 30`,k:["ghwm", "paper xxx", "paper 30", "hypersonic", "\u03c8hw", "glide vehicle", "hgv", "dark eagle", "df-17", "zircon", "mach 5"],a:`GHWM — Guarino Hypersonic Weapons Metric (Paper XXX)
Score: ΨHW = ΨSpeed × ΨEvasion × ΨPrecision × ΓRange

Domain: Hypersonic glide vehicles and hypersonic cruise missiles. Pi groups: Π1 = vmax/vref (speed superiority, Mach 5 reference), Π2 = qlim/qstag (thermal margin ratio), Π3 = nmax/nref (maneuver advantage), Π4 = Rrange/Rref (range ratio), Π5 = σref/σrcs (stealth ratio at speed), Π6 = Tref,bo/Tblackout (blackout resilience), Π7 = CEPref/CEP (precision ratio), Π8 = Pk (terminal lethality). Canonical cases: LRHW Dark Eagle (1.000 reference), ARRW Block 1 (0.720), DF-17 HGV (0.609), Zircon 3M22 (0.549).`},
  {q:`What is GTAMD paper 31`,k:["gtamd", "paper xxxi", "paper 31", "theater air missile defense", "iamd", "\u03b3tamd", "layered", "thaad", "sm-3", "kill chain"],a:`GTAMD — Guarino Theater Air and Missile Defense Metric (Paper XXXI)
Score: ΓTAMD = ΨCoverage × ΨCapacity × ΨKillChain × ΓAlert

Domain: Theater-level layered IAMD architecture scoring. Distinct from GADM (XVI) which scores individual batteries. ΓTAMD scores the architecture: layer completeness, geographic coverage fraction, intercept-to-raid ratio, magazine depth, layer handoff probability, battle management coverage, and warning time margin. Canonical cases: INDOPACOM Nominal (1.000 reference), European NATO (0.969), Taiwan IAMD (0.307), INDOPACOM Degraded (0.224).`},
  {q:`What is GCUAS paper 32`,k:["gcuas", "paper xxxii", "paper 32", "counter uas", "drone", "swarm", "\u03b3cuas", "c-uas", "defeat", "detection"],a:`GCUAS — Guarino Counter-UAS Metric (Paper XXXII)
Score: ΓCUAS = ΨDetection × ΨDefeat × ΨSaturation × ΨCoverage × ΓResponse

Domain: Counter-UAS architecture effectiveness against drone and swarm threats. Key Pi groups: Πdetect = Pdetect × (Nmod/3)^½ (multi-modal detection), Πdefeat = Pk + PEW − Pk×PEW (probability-of-union for kinetic+EW defeat), Πswarm = Nengaged/Nswarm (saturation margin). Canonical cases: Army SHORAD (1.000 reference), Navy Ship CIWS (0.762), Point-Defense Team (0.375), Ukraine Frontline (0.138 — dominated by swarm saturation).`},
  {q:`What is GHELM paper 33`,k:["ghelm", "paper xxxiii", "paper 33", "laser", "hel", "directed energy", "\u03c8hl", "high energy", "helios", "iron beam", "beer lambert"],a:`GHELM — Guarino High-Energy Laser Metric (Paper XXXIII)
Score: ΨHL = ΨPower × ΨBeam × ΨLethality × ΨAtmos × ΓEngagement

Domain: Directed energy laser weapon effectiveness. ΨAtmos = exp(−Π4) is the only exact-physics sub-metric in the entire suite — derived directly from the Beer-Lambert law, not a Padé approximation. Pi groups: Π1 = Plaser/Pref (power superiority, 50kW reference), Π2 = D²/(M²λR) (beam focus quality), Π3 = P/(qabl D²) (power-to-ablation ratio), Π4 = αatm × R (Beer-Lambert optical depth), Π5 = tdwell/tslew (engagement duty cycle). ΨLethality = 0.211 against armor is a hard physical limit. Canonical cases: HELIOS DDG 60kW (1.000), HELWS-MRZR 25kW (0.539), IRON BEAM 100kW (0.345), MSHORAD vs armor (0.229).`},
  {q:`What is GBCM paper 34`,k:["gbcm", "paper xxxiv", "paper 34", "boundary conditions", "limitations", "exclusions", "scope", "not patented", "nuclear deterrence", "gray zone"],a:`GBCM — Guarino Boundary Conditions Manuscript (Paper XXXIV)
NOT PATENTED — introduces no new dimensional governing variables.

Domain: Formal statement of the scope, limitations, and exclusions of the GMS. Five boundary domains identified where Buckingham π cannot be applied (governing variables have no SI units):
1. Nuclear deterrence posture — adversary perception has no physical units
2. Gray zone and sub-threshold competition — influence operations are not physical quantities
3. Coalition political will and burden sharing — political decisions are not governed by physical law
4. Intelligence assessment accuracy — analytical confidence has no SI units
5. Moral and will-to-fight factors — resolve is not dimensional

The paper argues that explicit boundaries are a methodological strength — a framework that knows what it cannot measure is more trustworthy than one that claims to measure everything.`},
  {q:`What domains are outside the suite`,k:["outside", "cannot score", "boundary", "excluded", "limitation", "nuclear deterrence", "gray zone", "will to fight", "political"],a:`Five domains lie outside the GMS by mathematical necessity (identified in GBCM, Paper XXXIV):

1. Nuclear deterrence posture — credibility and adversary perception have no SI units
2. Gray zone and sub-threshold competition — influence operations are not dimensional quantities
3. Coalition political will and burden sharing — political decisions are not governed by physical law
4. Intelligence assessment accuracy — analytical confidence cannot be measured physically
5. Moral and will-to-fight factors — resolve and morale have no dimensional governing variables

These exclusions are not limitations — they are mathematically necessary. The Buckingham π theorem requires dimensional governing variables. These domains have none.`},
  {q:`How does the suite compare to global firepower`,k:["global firepower", "compare", "heritage", "rand", "wei", "versus", "other frameworks", "better"],a:`Global Firepower Index assigns weights to 60+ variables (including oil production, labor force, merchant marine tonnage) with no physical derivation and no explanation of why those weights are chosen. Heritage Foundation MEI uses qualitative ratings. RAND WEI uses statistical analysis of historical combat. None apply dimensional analysis. None produce normalized scores comparable across domains. None chain into a theater equation.

The GMS difference: every score is derived from first principles using the Buckingham π theorem. Variables must be dimensional (measurable SI units). Scores are normalized dimensionless ratios. All 34 domain scores multiply into a single theater effectiveness number. This is the core originality claim.`},
  {q:`What is ΨCA combined arms`,k:["\u03c8ca", "combined arms", "\u03c8ca", "combined", "arms", "vehicle squad", "team"],a:`ΨCA = ΨVehicle × ΨSquad × ΓCA

Combined arms effectiveness integrates ground vehicle capability (GVEM, Paper VIII) with infantry squad capability (GSEM, Paper III) through the combined arms coupling coefficient ΓCA. The product structure captures the doctrinal requirement that combined arms teams are mutually dependent — vehicles without infantry are vulnerable to close-in threats, infantry without vehicles lacks firepower and protection. ΨCA feeds directly into ΨTheater and drives ground domain effectiveness.`},

• Paper I (GSM): U.S. Provisional App. No. 64/001,950, filed 10 March 2026

• Paper XXXIV (GBCM): NOT PATENTED`},
  {q:`What is DARPA ERIS`,k:["darpa", "eris", "darpa-ps-25-05", "submission", "competition", "demo"],a:`DARPA-PS-25-05 (Enabling Rigorous Investigation of Science, ERIS) is a DARPA program solicitation. The Guarino Metric Suite is being prepared for submission by the May 30, 2026 deadline. The centerpiece of the submission is a live ΨTheater demonstration — showing real-time theater effectiveness scoring using the full 34-paper suite. The GMS directly addresses DARPA's interest in rigorous, physics-derived frameworks for defense analysis.`},
  {q:`What is the beer lambert law in the suite`,k:["beer lambert", "beer-lambert", "atmospheric", "\u03b1atm", "extinction", "laser attenuation", "exact physics"],a:`The Beer-Lambert law appears in GHELM (Paper XXXIII) as ΨAtmos = exp(−Π4), where Π4 = αatm × R (atmospheric extinction coefficient times range). This is the only exact-physics sub-metric in the entire GMS — derived directly from the physical law governing laser propagation through the atmosphere, not approximated by a Padé function. αatm also interfaces with GCBRNM (Paper XIV), where CBRN obscurants elevate αatm and degrade ΨAtmos across all laser engagements.`},
  {q:`What are pade approximations`,k:["pade", "pad\u00e9", "approximation", "smooth", "bounded", "scoring function", "mathematical form"],a:`Throughout the GMS, sub-metric scores are constructed using Padé approximations — rational polynomial functions of the form P(x) = x^n / (1 + x^n). These functions are smooth, monotonically increasing, bounded between 0 and 1, and have physically meaningful asymptotes. They map dimensionless Pi group values to sub-metric scores without introducing discontinuities or arbitrary step functions. The sole exception is GHELM's ΨAtmos = exp(−αatm × R), which uses the Beer-Lambert exact form rather than a Padé approximation.`},
  {q:`What is guarino industries`,k:["guarino industries", "company", "llc", "raleigh", "uspto", "customer number", "221545"],a:`Guarino Industries LLC is the research and intellectual property entity founded by Brian Guarino, based in Raleigh, NC 27609. USPTO Customer No. 221545. It is the assignee for all GMS patent applications and the authoring institution for all 34 papers. The company's primary output is the Guarino Metric Suite and associated software tools including the Theater Equation Explorer, the Squad Loadout Planner, and G.I. J.o.E. AI.`},
  {q:`How does GSM feed into GMM and the theater equation`,k:["gsm gmm", "propulsion mission chain", "\u03c8g \u03c8mission", "platform weapon", "delivery chain feed"],a:`GSM (Paper I) produces ΨG — the propulsion architecture score for a delivery platform. GMM (Paper VII) assembles ΨMission = ΨG × ΨO × ΓC, where ΨO is GOSM's ordnance score and ΓC is the compatibility coupling from 6 Pi groups: hardpoint load fraction (Πh), release envelope compatibility (Πe), volume fraction (Πv), clearance area (Πa), pylon drag increment (Πdrag), and datalink/seeker latency (Πτ). ΨMission then enters ΨTheater directly.

The chain: platform physics (GSM) → weapon physics (GOSM) → integration physics (GMM) → ΨTheater. A high-ΨG platform with poor ΓC coupling produces a mediocre ΨMission despite platform excellence — this is the mathematical capture of the weapons integration problem.`},
  {q:`How does GBEM chain through GBEM Bridge into the theater equation`,k:["gbem bridge", "\u03b3base chain", "square root", "\u03c8base \u03b3base", "paper 26 paper 4", "basing theater"],a:`GBEM (Paper IV) produces ΨBase = ΨD × ΨL × ΨM × Γsite. GBEM Bridge (Paper XXVI) derives ΓBase = ΨBase^½ through formal dimensional analysis, showing the theater coupling coefficient scales as the square root of operational efficiency.

The square-root has physical meaning: halving ΨBase degrades ΓBase by ~29%, not 50%. A totally non-functional base drives ΓBase → 0, but partial degradation is partially recoverable. GBEM Bridge is the only paper in the suite that derives its score from another paper's output rather than from raw physical governing variables.`},
  {q:`How do GCEWM and GC2M interact`,k:["gcewm gc2m", "ew degrades c2", "electromagnetic command", "jamming c2", "spectrum c2", "cyber command"],a:`GCEWM (Paper XII) scores tactical EW and cyber (Γcyber). GC2M (Paper X) scores C2 architecture quality (ΓC2). These multiply independently in ΨTheater but have a documented intra-suite coupling: adversary EW attacks the network infrastructure underpinning Γnet and Γint in GC2M.

A high own-force Γcyber suppresses adversary ability to degrade ΓC2. A low Γcyber creates compounding loss — the theater simultaneously loses EW capability AND command quality. In a contested EM environment, these two terms are the most tightly coupled in the theater equation. The force that lets adversary EW go unanswered is paying double.`},
  {q:`How does GISM feed GJFM and the kill chain`,k:["gism gjfm", "isr targeting", "kill chain", "sensor to shooter", "targeting latency", "intelligence fires"],a:`GISM (Paper XIII) produces ΓISR capturing detection, resolution, persistence, and multi-INT fusion. GJFM (Paper XXIX) scores joint fires synchronization. GISM feeds GJFM through the targeting latency Pi group: Πlatency = τtarget / τrequired, where τtarget is time from detection to fires authorization and τrequired is maximum acceptable latency for the target class.

High ΓISR drives Πlatency toward 1, enabling high ΓJF. Poor ISR forces ΓJF into a degraded regime regardless of fires capacity. The physical law: unlimited fires with no targets equals zero combat power. The sensor-to-shooter chain is not a doctrine preference — it is a multiplicative term in ΨTheater.`},
  {q:`How do GADM and ΓTAMD relate to each other`,k:["gadm \u03b3tamd", "battery architecture", "shorad layered", "individual battery theater iamd", "paper 16 31"],a:`GADM (Paper XVI) scores individual air defense batteries: interceptor Pk, engagement envelope, reload cycle ratio, radar detection margin. ΓTAMD (Paper XXXI) scores the theater-level IAMD architecture: layer completeness, geographic coverage fraction, saturation margin across a full raid, kill chain continuity, and warning time margin.

GADM provides battery-level inputs; ΓTAMD aggregates them into an architecture score. A theater filled with excellent GADM-scoring batteries can still score poorly on ΓTAMD if layers have coverage gaps, inter-layer handoff probability is low, or magazine depth is insufficient against a mass raid. ΓTAMD is the architectural integral of GADM's platform scores.`},
  {q:`How does GHELM connect to GCUAS and GCBRNM`,k:["ghelm gcuas gcbrnm", "laser cuas cbrn", "\u03b1atm obscurant", "directed energy counter uas", "beer lambert cbrn cascade"],a:`GHELM (Paper XXXIII) depends on αatm in its Beer-Lambert sub-metric: ΨAtmos = exp(−αatm × R). GCBRNM (Paper XIV) establishes that CBRN obscurants elevate αatm, directly degrading ΨAtmos and ΨHL.

GCUAS (Paper XXXII) scores counter-UAS where HEL is one defeat channel: Πdefeat = Pk + PEW − Pk×PEW. When αatm rises, HEL Pk drops, weakening GCUAS defeat score.

Three-paper cascade: obscurant deployment → GCBRNM elevates αatm → GHELM ΨAtmos degrades → GCUAS HEL channel weakens → ΓCUAS falls → ΨTheater drops. An adversary that deploys smoke to defeat laser-based C-UAS is deliberately exploiting this cascade.`},
  {q:`How does GUWM connect to GNPM`,k:["guwm gnpm", "undersea surface", "submarine surface naval", "\u03c8uw \u03c8naval", "maritime undersea"],a:`GNPM (Paper V) scores surface naval platforms. GUWM (Paper XXVII) scores undersea warfare. In ΨTheater they multiply as separate terms — surface and undersea contribute independently. But GUWM explicitly interfaces with GNPM for coordinated surface/subsurface operations: surface noise can mask submarine signatures and combined arms at sea modifies both scoring environments.

The theater equation captures their independence; the paper interfaces capture their synergy. A force that degrades adversary GNPM while maintaining own GUWM achieves sea control from two vectors simultaneously.`},
  {q:`How does GLMM feed GCUAS and GJFM`,k:["glmm gcuas gjfm", "loitering munitions counter uas fires", "swarm drone fires sync", "\u03c8lmm \u03b3cuas \u03b3jf"],a:`GLMM (Paper XXV) scores loitering munitions: endurance, guidance accuracy, warhead lethality, swarm density, GPS-denied navigation. Two downstream connections:

1. GCUAS (Paper XXXII): adversarial GLMM is the primary threat GCUAS must defeat. GLMM's swarm density Pi group directly stresses GCUAS's saturation margin (Πswarm = Nengaged/Nswarm). High adversary ΨLMM against low own-force ΓCUAS is the most operationally dangerous asymmetry in the suite.

2. GJFM (Paper XXIX): friendly GLMM feeds into joint fires synchronization as an organic precision strike option. GJFM scores how well loitering munitions integrate into the fires plan alongside cannon, rocket, and air-delivered fires.`},
  {q:`How do GSCM and GCEWM differ and interact`,k:["gscm gcewm", "strategic tactical cyber", "apt tactical ew", "paper 28 12", "nation state tactical cyber"],a:`GCEWM (Paper XII) scores tactical cyber and EW at operational level: jamming, cyber effects in the maneuver fight, spectrum dominance. Γcyber operates at hours-to-days timescales.

GSCM (Paper XXVIII) scores strategic cyber resilience against pre-positioned APT campaigns: network segmentation, dwell-time detection, recovery time objectives, deterrence signaling. ΓStrategicCyber operates at months-to-years timescales and concerns critical infrastructure and strategic C2.

They enter ΨTheater as separate multiplicative terms. An adversary can dominate GCEWM (tactical jamming) while losing GSCM (unable to penetrate strategic networks), or vice versa. The suite separates them because governing variables, timescales, and defeat mechanisms are physically distinct.`},
  {q:`How are Pi groups constructed from governing variables`,k:["pi groups construct", "buckingham procedure", "dimensional matrix", "derive pi", "how to build pi"],a:`Formal Buckingham π procedure used across all GMS papers:

1. Identify governing dimensional variables (n variables with SI units)
2. Determine fundamental dimensions spanned (k — typically M, L, T plus others)
3. Independent Pi groups = n − k
4. Select k repeating variables spanning the full dimensional space
5. Form each Pi group by combining remaining variables with repeating variables to achieve dimensional homogeneity

Example — GASM Mode A (airlift): variables include mpayload (M), mMTOW (M), Ractual (L), Rmission (L), ρalt (ML⁻³), ρSL (ML⁻³), tground (T), tmission (T). With k=3, we get 5 Pi groups: Πpayload = mpayload/mMTOW, Πrange = Ractual/Rmission, Πdensity = ρalt/ρSL, Πground = tground/tmission — all dimensionless ratios with direct physical meaning.`},
  {q:`Why does the theater equation use multiplication instead of addition`,k:["multiplication product", "why multiply", "additive vs multiplicative", "zero domain", "theater structure math"],a:`The multiplicative structure captures two properties addition cannot:

1. Zero-floor enforcement: any domain score of zero drives ΨTheater to zero regardless of other strengths. A force with zero logistics (Γsustain → 0) has zero sustained combat power even with perfect C2 and fires. Additive scoring would let other domains compensate — physically incorrect.

2. Diminishing returns on individual excellence: in a product, improving one already-high term while neglecting a low term yields less theater gain than raising the low term. This captures the doctrinal principle of balanced joint force design — the weakest link dominates.

The product structure is not a modeling choice. Each term is dimensionless and the only dimensionally consistent combination of dimensionless terms that preserves the multiplicative structure of physical laws is a product.`},
  {q:`Why are Padé approximations used for sub-metric scoring`,k:["pade pad\u00e9", "approximation", "scoring function", "bounded smooth", "why pade", "mathematical form"],a:`Sub-metric scores use Padé approximants of the form S(Π) = Πⁿ / (1 + Πⁿ) for capability terms or S(Π) = 1 / (1 + Πⁿ) for penalty terms.

Reasons:
• Bounded output: S ∈ (0,1) — no sub-metric exceeds 1 or goes negative
• Monotonic: S increases continuously with Π, preserving physical ordering
• Smooth: no discontinuities or scoring cliffs
• Physically meaningful asymptotes: Π → 0 gives S → 0 (system fails); Π → ∞ gives S → 1 (saturates at reference)
• Normalization: at Π = 1 (system equals reference), S = 0.5 exactly — consistent baseline across all papers

Sole exception: GHELM's ΨAtmos = exp(−αatm × R). The Beer-Lambert law is exact physics, not an approximation, and preserves its exponential decay form.`},
  {q:`How is the completeness coefficient CG defined in GSM`,k:["completeness coefficient", "cg", "gsm completeness", "c_g", "tiered similarity", "missing pi groups"],a:`CG in GSM (Paper I) addresses the reality that not all 12 Pi groups can always be computed — some governing variables may be classified, proprietary, or unavailable. CG = (computed Pi groups) / 12.

The Tiered Similarity Index ΓG adjusts the score based on CG:
• CG = 1.0: full ΨG score reported
• CG = 0.75–1.0: score reported with confidence band
• CG < 0.75: score flagged as provisional

This is methodologically important: GSM scores remain valid under partial information, unlike black-box models that fail silently when data is missing. The framework degrades gracefully — a strength for defense applications where data availability varies by classification level.`},
  {q:`How does GOSM normalize scores to the Mk 82`,k:["gosm normalization", "mk 82", "psi ref", "35.524", "reference warhead", "normalize ordnance"],a:`GOSM (Paper II) normalizes all ΨO scores to the Mk 82 500lb GP bomb. PSI_REF = 35.524 is the computed raw GOSM score for the Mk 82 under standard conditions, derived from its physical parameters: warhead mass, explosive fill fraction, fragmentation density, detonation velocity, and lethal area.

All other weapons score relative to this: ΨO = raw_score / 35.524.
• ΨO = 1.000 exactly for the Mk 82
• ΨO > 1.0 for more lethal weapons (Hellfire AGM-114R ≈ 2.41 in Mode B HEAT)
• ΨO < 1.0 for less lethal weapons

The Mk 82 is the most widely produced and operationally representative precision munition in the Western inventory — a stable, physically grounded reference that any defense analyst can benchmark against.`},
  {q:`What is a binding constraint and why does it matter`,k:["binding constraint", "binding", "binding pi", "what binds", "bottleneck", "weakest pi", "constraining"],a:`A binding constraint in the GMS is the single Pi group whose value is closest to zero and therefore most limits the overall metric score. Because sub-metrics are products of Padé-scored Pi groups, the lowest-scoring Pi group dominates — it is the system's physical bottleneck.

Binding constraints matter because they identify where engineering investment yields the most gain. If ΨG is bound by Πη (energy conversion efficiency), improving the thermal system yields more ΨG improvement than improving the electromagnetic system. If ΓTAMD is bound by ΨCoverage, adding interceptor capacity yields less gain than closing the coverage gap.

Every canonical case in the GMS reports its binding constraint. This is the actionable output — not just the score, but where to invest to improve it.`},
  {q:`What are the canonical cases for GHWM and what do they tell us`,k:["ghwm canonical", "hypersonic cases", "dark eagle arrw df-17 zircon", "lrhw", "hypersonic scores", "ghwm cases"],a:`GHWM (Paper XXX) canonical cases with binding constraints:

  {q:`What do the ΓTAMD canonical cases reveal about IAMD architecture`,k:["\u03b3tamd canonical", "tamd cases", "indopacom taiwan iamd", "european nato iamd", "layered defense scores", "missile defense cases"],a:`ΓTAMD (Paper XXXI) canonical cases:

  {q:`What do the GCUAS canonical cases reveal about counter-UAS`,k:["gcuas canonical", "counter uas cases", "ukraine frontline", "army shorad cuas", "navy ciws drone", "point defense"],a:`GCUAS (Paper XXXII) canonical cases:

  {q:`What do the GTLM canonical cases reveal about logistics`,k:["gtlm canonical", "logistics cases", "pacific island chain", "nato european corps", "\u03b3sustain cases", "supply chain scores"],a:`GTLM (Paper IX) canonical cases:

• Pacific Island Chain: Γsustain = 0.41 — binding: Γreach (reach-back capability). The Pacific is the most logistics-constrained theater in the GMS. Distance from depots, limited basing, and vulnerability of sea lines of communication drive Γreach to its lowest suite value.

  {q:`What happens to ΨTheater if logistics collapses`,k:["logistics collapse", "\u03b3sustain zero", "gtlm sensitivity", "what if logistics fails", "sustainment degraded", "theater logistics sensitivity"],a:`If Γsustain → 0, ΨTheater → 0 regardless of all other domain scores. This is the mathematical statement of the doctrinal truth: combat power without sustainment is zero on a long enough timeline.

Sensitivity analysis shows Γsustain has among the highest elasticity in the theater equation for extended operations — its impact grows over time as forces attrit and supply lines stress. The GMS captures why logistics is 'the sinews of war' in dimensional terms.`},
  {q:`What happens to ΨTheater if C2 is degraded`,k:["c2 degraded", "\u03b3c2 sensitivity", "command control failure", "c2 collapse", "jadc2 legacy", "ew degrades c2 theater"],a:`GC2M (Paper X) canonical cases show ΓC2 ranging from 0.82 (JADC2) to 0.38 (legacy C2). The difference in ΨTheater between these two scenarios — holding all other terms equal — is a factor of 0.82/0.38 = 2.16. The theater with modern JADC2 is more than twice as effective as the same force under legacy C2.

  {q:`What happens to ΨTheater if space is degraded`,k:["space degraded", "\u03c8space sensitivity", "asat", "gps denied", "satellite loss", "space theater sensitivity", "anti satellite"],a:`GSFM (Paper XI) produces ΨSpace, which enters ΨTheater directly. But space degradation has second-order effects across multiple other terms:

  {q:`What happens to ΨTheater when CBRN environments are present`,k:["cbrn theater", "\u03b3cbrn sensitivity", "chemical biological radiological", "cbrn degradation", "nuclear environment theater"],a:`ΓCBRN (Paper XIV) enters ΨTheater as a direct multiplicative term. Full CBRN Class III environment scores ΓCBRN = 0.440 — meaning the entire theater score is cut by more than half from contamination alone, before any other domain degradation.

  {q:`Which single paper has the highest impact on ΨTheater if it degrades`,k:["highest impact", "most important paper", "single paper sensitivity", "which term matters most", "dominant term theater"],a:`No single paper universally dominates — ΨTheater sensitivity varies by scenario and baseline. However, the GMS structure reveals three candidates with disproportionate impact:

function joeMatch(input) {
  const tokens = input.toLowerCase().replace(/[^a-z0-9ψγπ ]/g,' ').split(/\s+/).filter(t=>t.length>1);
  let best = null, bestScore = 0;
  for (const item of QA_BANK) {
    let score = 0;
    for (const t of tokens) {
      for (const k of item.k) {
        if (k === t) score += 12;
        else if (k.includes(t) || t.includes(k)) score += k.length > 4 ? 3 : 1;
      }
    }
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return bestScore >= 2 ? best : null;
}

function renderJoe() {
  const selPaperSuggestions = selPaper ? [
    `What is ${selPaper.abbr}?`,
    `What are the Pi groups in ${selPaper.abbr}?`,
    `How does ${selPaper.abbr} feed into the theater equation?`,
  ] : [];
  const generalSuggestions = [
    'What is the theater equation?',
    'What is the Buckingham π theorem?',
    'What is the difference between Ψ and Γ?',
    'What happens to ΨTheater if C2 is degraded?',
    'What domains are outside the suite boundary?',
    'Which single paper has the highest impact on ΨTheater?',
  ];
  const suggestions = [...selPaperSuggestions, ...generalSuggestions].slice(0, 6);
  const pillsHtml = suggestions.map(s =>
    `<span class="joe-pill" onclick="joeHandlePill(\`${s.replace(/`/g,"'")}\`)">${s}</span>`
  ).join('');

  return `
  <div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--color-text-tertiary);margin:.75rem 0 .5rem;font-weight:500">
    G.I. J.o.E. AI — Guarino Industries Joint Offensive &amp; defensive physics Engine
    <span style="margin-left:8px;padding:2px 7px;border-radius:10px;background:#eaf3de;color:#27500a;font-size:10px;text-transform:none;letter-spacing:0">Offline · 73 Q&amp;A pairs</span>
  </div>
  <div class="joe-wrap">
    <div class="joe-suggest">${pillsHtml}</div>
    <div class="joe-msgs" id="joe-msgs">
      <div class="joe-msg joe">Ready. Ask me anything about the 34-paper Guarino Metric Suite — papers, Pi groups, binding constraints, theater equation sensitivity, cross-paper interactions, or suite methodology.</div>
    </div>
    <div class="joe-input-row">
      <input class="joe-input" id="joe-input" type="text" placeholder="Ask about any paper, metric, Pi group, binding constraint, or the theater equation…"
        onkeydown="if(event.key==='Enter'){joeHandleInput();}" />
      <button class="joe-send" id="joe-send" onclick="joeHandleInput()">Ask</button>
    </div>
  </div>`;
}

function joeHandleInput() {
  const input = document.getElementById('joe-input');
  if (!input || !input.value.trim()) return;
  joeAsk(input.value.trim());
  input.value = '';
}

function joeHandlePill(text) { joeAsk(text); }

function joeAsk(question) {
  const msgsEl = document.getElementById('joe-msgs');
  if (!msgsEl) return;
  const uDiv = document.createElement('div');
  uDiv.className = 'joe-msg user';
  uDiv.textContent = question;
  msgsEl.appendChild(uDiv);
  const match = joeMatch(question);
  const aDiv = document.createElement('div');
  aDiv.className = 'joe-msg joe';
  aDiv.textContent = match
    ? match.a
    : "I don't have a pre-loaded answer for that specific question. I can answer questions about all 34 GMS papers, the theater equation, Pi group construction, binding constraints, cross-paper interactions, theater sensitivity, patent status, prior art, and suite methodology. Try rephrasing or select a suggested question above.";
  msgsEl.appendChild(aDiv);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
